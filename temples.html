<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latter-day Saint Temples - Photo Album</title>
    <meta name="author" content="John Peter Joseph">
    <meta name="description"
        content="Photo gallery of temples of The Church of Jesus Christ of Latter-day Saints in various countries.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>
        <h1>Temple Album</h1>

        <nav class="nav-container">
            <ul>
                <li>
                    <a href="#">Home</a>
                </li>
                <li>
                    <a href="#">Old</a>
                </li>
                <li>
                    <a href="#">New</a>
                </li>
                <li>
                    <a href="#">Large</a>
                </li>
                <li>
                    <a href="#">Small</a>
                </li>
            </ul>
        </nav>

        <button id="menu" aria-label="Menu"></button>

    </header>

    <main>
        <h2>Gallery</h2>

        <div class="container-fig">

            <figure><img src="images/temples/brasilia-temple.jpg" alt="Brasilia Temple">
                <figcaption>Brasilia (Brasil) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/buenos-aires-temple.jpg" alt="Buenos Aires Temple">
                <figcaption>Buenos Aires (Argentina) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/helsinki-temple.jpg" alt="Helsinki Temple">
                <figcaption>Helsinki (Finland) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/hong-kong-temple.jpg" alt="Hong Kong Temple">
                <figcaption>Hong Kong (China) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/port-au-prince-temple.jpg" alt="Port-au-Prince Temple">
                <figcaption>Port-au-Prince (Haiti) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/rome-temple.jpg" alt="Rome Temple">
                <figcaption>Rome (Italy) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/santiago-temple.jpg" alt="Santiago Temple">
                <figcaption>Santiago (Chile) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/santo-domingo-temple.jpg" alt="Santo Domingo Temple">
                <figcaption>Santo Domingo (Dominican Republic) Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temples/urdaneta-temple.jpg" alt="Phillipines Temple">
                <figcaption>Urdaneta (Phillipines) Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>&#169; <span id="currentyear"></span> &bull; John Peter Joseph &bull; Haïti</p>
        <p id="lastModified"></p>
    </footer>

</body>

</html>
